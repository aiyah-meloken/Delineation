name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app with updater signature
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Apply updater public key from repository secret
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "$TAURI_UPDATER_PUBLIC_KEY" ]; then
            echo "TAURI_UPDATER_PUBLIC_KEY is empty; using the public key committed in tauri.conf.json."
            exit 0
          fi
          node - <<'NODE'
          const fs = require('fs')
          const path = 'src-tauri/tauri.conf.json'
          const config = JSON.parse(fs.readFileSync(path, 'utf8'))
          config.plugins ??= {}
          config.plugins.updater ??= {}
          config.plugins.updater.pubkey = process.env.TAURI_UPDATER_PUBLIC_KEY
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`)
          NODE

      - name: Build, sign updater artifacts, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Delineation ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
          includeUpdaterJson: true
